<!-- templates/livros/listar.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Livros</title>
</head>
<body>

<h1>Livros Cadastrados</h1>

<a th:href="@{/livros/novo}">Novo Livro</a>

<br><br>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome do Livro</th>
            <th>Categoria</th>
            <th>Usuário</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody>
        <!-- percorre todos os livros -->
        <tr th:each="l : ${livros}">
            <td th:text="${l.id}"></td>
            <td th:text="${l.nomeLivro}"></td>
            <td th:text="${l.categoria}"></td>

            <!-- acessa o nome do usuário relacionado -->
            <td th:text="${l.usuario != null ? l.usuario.nome : 'Sem usuário'}"></td>

            <td>
                <a th:href="@{'/livros/editar/' + ${l.id}}">Editar</a>

                <a th:href="@{'/livros/deletar/' + ${l.id}}"
                   onclick="return confirm('Deseja excluir este livro?')">
                   Excluir
                </a>
            </td>
        </tr>
    </tbody>

</table>

</body>
</html>
