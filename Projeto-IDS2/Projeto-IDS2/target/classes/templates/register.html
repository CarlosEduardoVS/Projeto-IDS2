<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro</title>
    <meta charset="UTF-8">
</head>
<body>

<h2>Criar Conta</h2>

<form th:action="@{/register}" method="post" th:object="${user}">

    <label>Nome:</label><br>
    <input type="text" th:field="*{nome}" placeholder="Seu nome" required><br><br>

    <label>Email:</label><br>
    <input type="email" th:field="*{email}" placeholder="Seu email" required><br><br>

    <label>Senha:</label><br>
    <input type="password" th:field="*{senha}" placeholder="Crie uma senha" required><br><br>

    <button type="submit">Cadastrar</button>
</form>

</body>
</html>
